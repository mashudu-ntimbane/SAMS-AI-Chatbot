<!-- SAMS Chatbot Widget -->
<style>
* { box-sizing: border-box; }
#sams-chat {
    position: fixed; bottom: 24px; right: 24px;
    width: 350px; background: #fff;
    border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: flex; flex-direction: column; overflow: hidden;
    font-family: 'Segoe UI', sans-serif; font-size: 14px;
    border: 1px solid #e2e8f0;
}
#sams-chat-header {
    background: #1a4a8a; color: #fff;
    padding: 14px 18px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
}
#sams-chat-header .dot { width:9px;height:9px;background:#4ade80;border-radius:50%; }
#sams-chat-messages {
    flex:1; overflow-y:auto; padding:14px;
    display:flex; flex-direction:column; gap:10px; max-height:320px;
}
.msg { max-width:80%; padding:10px 13px; border-radius:12px; line-height:1.5; }
.msg.bot  { background:#eef2ff; color:#1e293b; align-self:flex-start; border-bottom-left-radius:3px; }
.msg.user { background:#1a4a8a; color:#fff;    align-self:flex-end;   border-bottom-right-radius:3px; }
#sams-chat-input-row { display:flex; gap:8px; padding:12px; border-top:1px solid #e2e8f0; }
#sams-chat-input {
    flex:1; padding:9px 14px; border:1px solid #cbd5e1;
    border-radius:24px; outline:none; font-size:14px;
}
#sams-chat-input:focus { border-color:#1a4a8a; }
#sams-chat-send {
    background:#1a4a8a; color:#fff; border:none;
    border-radius:50%; width:38px; height:38px;
    cursor:pointer; font-size:15px;
}
#sams-chat-send:disabled { background:#94a3b8; cursor:not-allowed; }
</style>

<div id="sams-chat">
    <div id="sams-chat-header">
        <div class="dot"></div> SAMS Assistant
    </div>
    <div id="sams-chat-messages">
        <div class="msg bot">Hi! I can help with payments, accommodation rules, visitor policies, and application status. What would you like to know?</div>
    </div>
    <div id="sams-chat-input-row">
        <input type="text" id="sams-chat-input" placeholder="Type your question..." maxlength="200" autocomplete="off"/>
        <button id="sams-chat-send">&#9658;</button>
    </div>
</div>

<script>
const msgs  = document.getElementById('sams-chat-messages');
const input = document.getElementById('sams-chat-input');
const send  = document.getElementById('sams-chat-send');

function addMsg(text, role) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    send.disabled = true;

    try {
        // Update this path to match your SAMS folder structure
        const res  = await fetch('/New folder/Chatbot/chat_endpoint.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        addMsg(data.response || 'Sorry, I could not understand that.', 'bot');
    } catch (e) {
        addMsg('Connection error. Please try again.', 'bot');
    } finally {
        send.disabled = false;
        input.focus();
    }
}

send.addEventListener('click', sendMessage);
input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
</script>
